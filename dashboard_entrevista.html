<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Entrevistas — Grupo Cygnus</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e2ddd4;
  --border2: #c8c2b6;
  --text: #1a1714;
  --muted: #6b6458;
  --hint: #a09890;
  --accent: #c4432a;
  --accent2: #e8593c;
  --green: #2a5c3a;
  --green2: #3a8c56;
  --amber: #b07820;
  --amber2: #d4962a;
  --blue: #1e3a5c;
  --blue2: #2a5a8c;
  --red: #8b1a1a;
  --font: 'Syne', sans-serif;
  --serif: 'Playfair Display', serif;
  --mono: 'DM Mono', monospace;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(26,23,20,0.08);
  --shadow2: 0 8px 32px rgba(26,23,20,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

/* ══ HEADER ══ */
.header {
  background: var(--text);
  padding: 1.25rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.brand { font-family: var(--serif); font-size: 20px; color: #f7f5f0; font-weight: 400; }
.brand em { color: var(--accent2); }
.header-sub { font-size: 11px; color: rgba(247,245,240,0.4); letter-spacing: .12em; text-transform: uppercase; }

/* ══ LAYOUT ══ */
.layout { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 60px); }

/* ══ SIDEBAR ══ */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  max-height: calc(100vh - 60px);
  position: sticky; top: 60px;
}
.sidebar-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.sidebar-count { font-family: var(--mono); font-size: 11px; color: var(--hint); }

.candidato-item {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.candidato-item:hover { background: var(--surface2); }
.candidato-item.active { background: var(--text); }
.candidato-item.active .ci-nombre { color: #f7f5f0; }
.candidato-item.active .ci-meta { color: rgba(247,245,240,0.5); }
.candidato-item.active .ci-badge { background: rgba(255,255,255,0.1); color: rgba(247,245,240,0.7); }

.ci-nombre { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.ci-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.ci-footer { display: flex; align-items: center; gap: 6px; }
.ci-badge {
  font-size: 10px; font-weight: 700; letter-spacing: .06em;
  padding: 2px 8px; border-radius: 20px;
  background: var(--surface2); color: var(--muted);
  text-transform: uppercase;
}
.ci-rec {
  width: 8px; height: 8px; border-radius: 50%;
  margin-left: auto;
}
.rec-verde { background: var(--green2); }
.rec-amarillo { background: var(--amber2); }
.rec-rojo { background: var(--red); }

.sidebar-empty {
  padding: 3rem 1.5rem; text-align: center;
  color: var(--hint); font-size: 13px; line-height: 1.7;
}

/* ══ MAIN ══ */
.main { padding: 2rem; overflow-y: auto; }

/* ══ EMPTY STATE ══ */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh; text-align: center;
}
.empty-icon { font-size: 56px; margin-bottom: 1.5rem; opacity: .3; }
.empty-title { font-family: var(--serif); font-size: 24px; font-weight: 400; color: var(--muted); margin-bottom: .5rem; }
.empty-sub { font-size: 13px; color: var(--hint); }

/* ══ INFORME ══ */
.informe { max-width: 900px; }

/* Cabecera candidato */
.candidato-header {
  background: var(--text);
  border-radius: var(--radius);
  padding: 2rem;
  margin-bottom: 1.5rem;
  display: grid; grid-template-columns: 1fr auto;
  gap: 1rem; align-items: start;
}
.ch-nombre { font-family: var(--serif); font-size: 28px; font-weight: 400; color: #f7f5f0; margin-bottom: 4px; }
.ch-cargo { font-size: 13px; color: rgba(247,245,240,0.5); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 1rem; }
.ch-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; }
.ch-meta-item { font-size: 12px; color: rgba(247,245,240,0.4); }
.ch-meta-item strong { color: rgba(247,245,240,0.8); display: block; font-size: 13px; }

.rec-badge {
  padding: .75rem 1.25rem; border-radius: 8px;
  text-align: center; min-width: 140px;
}
.rec-badge.verde { background: rgba(42,92,58,.3); border: 1px solid rgba(58,140,86,.3); }
.rec-badge.amarillo { background: rgba(176,120,32,.3); border: 1px solid rgba(212,150,42,.3); }
.rec-badge.rojo { background: rgba(139,26,26,.3); border: 1px solid rgba(196,67,42,.3); }
.rec-emoji { font-size: 28px; margin-bottom: 4px; }
.rec-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; }
.rec-badge.verde .rec-label { color: #3a8c56; }
.rec-badge.amarillo .rec-label { color: #d4962a; }
.rec-badge.rojo .rec-label { color: var(--accent2); }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow);
}
.card-header {
  display: flex; align-items: center; gap: .75rem;
  margin-bottom: 1.25rem; padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.card-icon { font-size: 18px; }
.card-title { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

/* Análisis ejecutivo */
.resumen-texto {
  font-family: var(--serif); font-size: 16px; font-weight: 400;
  line-height: 1.8; color: var(--text); font-style: italic;
  padding: 1rem 1.25rem; background: var(--surface2);
  border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0;
  margin-bottom: 1.25rem;
}

.hallazgos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.hallazgo-item {
  padding: 1rem; border-radius: 8px;
  border: 1px solid var(--border);
}
.hallazgo-item.fortaleza { background: rgba(42,92,58,.05); border-color: rgba(58,140,86,.2); }
.hallazgo-item.alerta { background: rgba(139,26,26,.05); border-color: rgba(196,67,42,.2); }
.hallazgo-label {
  font-size: 10px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; margin-bottom: .5rem;
}
.hallazgo-item.fortaleza .hallazgo-label { color: var(--green2); }
.hallazgo-item.alerta .hallazgo-label { color: var(--accent); }
.hallazgo-comp { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.hallazgo-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* Competencias */
.competencia-block {
  border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  margin-bottom: 1rem;
}
.comp-header {
  padding: 1rem 1.25rem;
  display: flex; align-items: center; gap: 1rem;
  cursor: pointer; transition: background .15s;
  background: var(--surface2);
}
.comp-header:hover { background: var(--border); }
.comp-grado {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 16px; font-weight: 500;
  flex-shrink: 0;
}
.grado-A { background: rgba(42,92,58,.15); color: var(--green); border: 1px solid rgba(42,92,58,.3); }
.grado-B { background: rgba(30,58,92,.1); color: var(--blue); border: 1px solid rgba(30,58,92,.25); }
.grado-C { background: rgba(176,120,32,.1); color: var(--amber); border: 1px solid rgba(176,120,32,.25); }
.grado-D { background: rgba(139,26,26,.1); color: var(--red); border: 1px solid rgba(139,26,26,.25); }

.comp-info { flex: 1; }
.comp-nombre { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.comp-obs { font-size: 12px; color: var(--muted); }
.comp-star { display: flex; gap: 6px; margin-left: auto; }
.star-pip {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; letter-spacing: .04em;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted);
}
.star-pip.active { background: var(--text); color: #f7f5f0; border-color: var(--text); }
.comp-chevron { color: var(--hint); font-size: 12px; transition: transform .2s; }
.comp-chevron.open { transform: rotate(180deg); }

.comp-body { display: none; padding: 1.25rem; border-top: 1px solid var(--border); }
.comp-body.open { display: block; }

.star-detalle { display: grid; grid-template-columns: repeat(4,1fr); gap: .75rem; margin-bottom: 1rem; }
.star-item { text-align: center; padding: .75rem .5rem; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); }
.star-letra { font-family: var(--mono); font-size: 18px; font-weight: 500; margin-bottom: 2px; }
.star-nombre { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }
.star-pts { font-size: 11px; color: var(--hint); }
.star-item.ok .star-letra { color: var(--green); }
.star-item.parcial .star-letra { color: var(--amber); }
.star-item.nok .star-letra { color: var(--red); }

.transcripcion-box {
  background: var(--surface2); border-radius: 8px;
  padding: 1rem; margin-bottom: 1rem;
  font-size: 13px; color: var(--muted); line-height: 1.7;
  font-style: italic; border: 1px solid var(--border);
}
.transcripcion-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--hint); margin-bottom: .5rem; font-style: normal; }

.video-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; color: var(--blue);
  padding: 6px 14px; border: 1px solid rgba(30,58,92,.25);
  border-radius: 6px; background: rgba(30,58,92,.05);
  text-decoration: none; transition: all .15s;
}
.video-link:hover { background: rgba(30,58,92,.1); }

/* Emocional */
.emo-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1rem; }
.emo-item { text-align: center; padding: 1rem; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); }
.emo-emoji { font-size: 28px; margin-bottom: 4px; }
.emo-valor { font-family: var(--mono); font-size: 20px; font-weight: 500; margin-bottom: 2px; }
.emo-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }

.alerta-emo {
  display: flex; align-items: center; gap: .75rem;
  padding: .75rem 1rem; border-radius: 8px; margin-bottom: .5rem;
  font-size: 13px;
}
.alerta-emo.warn { background: rgba(176,120,32,.08); border: 1px solid rgba(176,120,32,.2); color: var(--amber); }
.alerta-emo.ok { background: rgba(42,92,58,.08); border: 1px solid rgba(42,92,58,.2); color: var(--green); }

/* Radar */
.radar-wrap { max-width: 400px; margin: 0 auto; }

/* Brecha */
.brecha-item { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
.brecha-nombre { font-size: 13px; font-weight: 600; width: 180px; flex-shrink: 0; }
.brecha-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: visible; position: relative; }
.brecha-bar { height: 100%; border-radius: 4px; transition: width .5s; }
.brecha-bar.A { background: var(--green2); }
.brecha-bar.B { background: var(--blue2); }
.brecha-bar.C { background: var(--amber2); }
.brecha-bar.D { background: var(--red); }
.brecha-min { position: absolute; top: -3px; width: 2px; height: 14px; background: var(--text); border-radius: 2px; }
.brecha-grado { font-family: var(--mono); font-size: 13px; font-weight: 500; width: 24px; text-align: center; }
.brecha-req { font-size: 11px; color: var(--hint); width: 60px; }

/* Tabs */
.tabs { display: flex; gap: 2px; margin-bottom: 1.5rem; background: var(--surface2); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
.tab { flex: 1; padding: 8px 12px; border-radius: 7px; border: none; background: transparent; font-family: var(--font); font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all .15s; letter-spacing: .03em; }
.tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

/* Loading */
.loading { text-align: center; padding: 4rem 2rem; color: var(--hint); }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; max-height: 300px; }
  .hallazgos-grid { grid-template-columns: 1fr; }
  .emo-grid { grid-template-columns: repeat(2,1fr); }
  .star-detalle { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="brand">Grupo <em>Cygnus</em></div>
    <div class="header-sub">Dashboard · Entrevistas por Competencias</div>
  </div>
  <div style="font-size:11px;color:rgba(247,245,240,0.3);font-family:var(--mono);" id="header-fecha"></div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Candidatos</span>
      <span class="sidebar-count" id="sidebar-count">—</span>
    </div>
    <div id="lista-candidatos">
      <div class="sidebar-empty">
        <div style="font-size:32px;margin-bottom:.75rem;">⏳</div>
        Cargando candidatos...
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-content">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">Selecciona un candidato</div>
      <div class="empty-sub">Elige un candidato del panel izquierdo<br>para ver su informe completo.</div>
    </div>
  </div>

</div>

<script>
const APPS_URL = 'https://script.google.com/macros/s/AKfycbx1uyYc_qkW2HIdF1U_ta7ljST0dL1o-86gu38AXE-tpW7v2RpwPkrrnynNC3AqIQMu/exec';

// Grado mínimo requerido por cargo (Martha Alles)
const GRADO_REQUERIDO = {
  'Vendedor': { orientacion_cliente: 'B', orientacion_resultados: 'B', iniciativa: 'B', persuasion: 'B', trabajo_presion: 'C' },
  'Jefatura': { liderazgo: 'B', trabajo_equipo: 'B', planificacion: 'B', comunicacion: 'B', toma_decisiones: 'C' },
  'Gerencia': { vision_negocio: 'A', liderazgo: 'A', pensamiento_estrategico: 'A', orientacion_resultados: 'B', gestion_cambio: 'B' },
  'Administrativo': { orden_calidad: 'C', responsabilidad: 'C', trabajo_equipo: 'C', comunicacion: 'C', flexibilidad: 'C' },
  'Operario': { responsabilidad: 'D', trabajo_equipo: 'D', seguridad: 'C', orden_calidad: 'D', trabajo_presion: 'D' },
  'Otro': { comunicacion: 'C', trabajo_equipo: 'C', iniciativa: 'C', responsabilidad: 'C', orientacion_resultados: 'C' }
};

const GRADO_VAL = { A: 4, B: 3, C: 2, D: 1 };
const GRADO_COLOR = { A: 'verde', B: 'azul', C: 'amarillo', D: 'rojo' };

let entrevistas = [];
let candidatoActual = null;
let radarChart = null;

document.getElementById('header-fecha').textContent = new Date().toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// ══ CARGAR DATOS ══
async function cargarDatos() {
  try {
    const r = await fetch(APPS_URL + '?action=getEntrevistas');
    const d = await r.json();
    entrevistas = d.entrevistas || [];
    renderSidebar();
  } catch(e) {
    document.getElementById('lista-candidatos').innerHTML = '<div class="sidebar-empty">Error cargando datos.<br>Verifica la conexión.</div>';
  }
}

// ══ SIDEBAR ══
function renderSidebar() {
  const lista = document.getElementById('lista-candidatos');
  document.getElementById('sidebar-count').textContent = entrevistas.length + ' candidato' + (entrevistas.length !== 1 ? 's' : '');

  if (entrevistas.length === 0) {
    lista.innerHTML = '<div class="sidebar-empty">Sin entrevistas registradas aún.</div>';
    return;
  }

  lista.innerHTML = entrevistas.map(function(e, i) {
    const rec = calcularRecomendacion(e);
    const recClass = rec.clase;
    return '<div class="candidato-item" onclick="verCandidato(' + i + ')" id="ci-' + i + '">'
      + '<div class="ci-nombre">' + (e.nombre || 'Sin nombre') + '</div>'
      + '<div class="ci-meta">' + (e.cargo || '—') + ' · ' + (e.fecha || '—') + '</div>'
      + '<div class="ci-footer">'
      + '<span class="ci-badge">' + (e.estado || 'Completada') + '</span>'
      + '<span class="ci-rec rec-' + recClass + '"></span>'
      + '</div></div>';
  }).join('');
}

// ══ VER CANDIDATO ══
function verCandidato(idx) {
  document.querySelectorAll('.candidato-item').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('ci-' + idx).classList.add('active');
  candidatoActual = entrevistas[idx];
  renderInforme(candidatoActual);
}

// ══ CALCULAR RECOMENDACIÓN ══
function calcularRecomendacion(ent) {
  const analisis = ent.analisis_star || [];
  if (analisis.length === 0) return { clase: 'amarillo', texto: 'Sin datos', emoji: '🟡' };

  const reqs = GRADO_REQUERIDO[ent.cargo] || GRADO_REQUERIDO['Otro'];
  let cumple = 0, parcial = 0, noCumple = 0;

  analisis.forEach(function(a) {
    const grado = a.analisis ? a.analisis.grado : 'D';
    const req = reqs[a.competencia_id] || 'C';
    const diff = GRADO_VAL[grado] - GRADO_VAL[req];
    if (diff >= 0) cumple++;
    else if (diff === -1) parcial++;
    else noCumple++;
  });

  if (noCumple === 0 && parcial <= 1) return { clase: 'verde', texto: 'Recomendado', emoji: '🟢' };
  if (noCumple <= 1) return { clase: 'amarillo', texto: 'Con reservas', emoji: '🟡' };
  return { clase: 'rojo', texto: 'No recomendado', emoji: '🔴' };
}

// ══ RENDER INFORME ══
function renderInforme(ent) {
  if (radarChart) { radarChart.destroy(); radarChart = null; }
  const rec = calcularRecomendacion(ent);
  const analisis = ent.analisis_star || [];
  const emociones = ent.emociones || [];
  const transcripciones = ent.transcripciones || [];
  const videos = ent.videos || [];

  // Calcular datos generales emocionales
  const emoResumen = calcularEmoResumen(emociones);

  // Generar resumen ejecutivo
  const resumenTexto = generarResumenEjecutivo(ent, analisis, emoResumen, rec);
  const fortalezas = analisis.filter(function(a) { return a.analisis && (a.analisis.grado === 'A' || a.analisis.grado === 'B'); });
  const alertas = analisis.filter(function(a) { return a.analisis && (a.analisis.grado === 'C' || a.analisis.grado === 'D'); });

  const html = '<div class="informe">'

    // Cabecera
    + '<div class="candidato-header">'
    + '<div>'
    + '<div class="ch-nombre">' + (ent.nombre || 'Sin nombre') + '</div>'
    + '<div class="ch-cargo">' + (ent.cargo || '—') + '</div>'
    + '<div class="ch-meta">'
    + '<div class="ch-meta-item"><strong>' + (ent.rut || '—') + '</strong>RUT</div>'
    + '<div class="ch-meta-item"><strong>' + (ent.email || '—') + '</strong>Email</div>'
    + '<div class="ch-meta-item"><strong>' + (ent.fecha || '—') + '</strong>Fecha</div>'
    + '<div class="ch-meta-item"><strong>' + analisis.length + ' de 5</strong>Competencias</div>'
    + '</div>'
    + '</div>'
    + '<div class="rec-badge ' + rec.clase + '">'
    + '<div class="rec-emoji">' + rec.emoji + '</div>'
    + '<div class="rec-label">' + rec.texto + '</div>'
    + '</div>'
    + '</div>'

    // Tabs
    + '<div class="tabs">'
    + '<button class="tab active" onclick="switchTab(\'ejecutivo\', this)">📋 Análisis ejecutivo</button>'
    + '<button class="tab" onclick="switchTab(\'competencias\', this)">🎯 Competencias</button>'
    + '<button class="tab" onclick="switchTab(\'emocional\', this)">😊 Perfil emocional</button>'
    + '<button class="tab" onclick="switchTab(\'brecha\', this)">📊 Brecha vs cargo</button>'
    + '</div>'

    // ─── TAB EJECUTIVO ───
    + '<div id="tab-ejecutivo">'
    + '<div class="card">'
    + '<div class="card-header"><span class="card-icon">📋</span><span class="card-title">Resumen ejecutivo</span></div>'
    + '<div class="resumen-texto">' + resumenTexto + '</div>'
    + '<div class="hallazgos-grid">'
    + (fortalezas.length > 0
      ? fortalezas.slice(0,2).map(function(f) {
          return '<div class="hallazgo-item fortaleza">'
            + '<div class="hallazgo-label">✓ Fortaleza</div>'
            + '<div class="hallazgo-comp">' + f.competencia + ' — Grado ' + f.analisis.grado + '</div>'
            + '<div class="hallazgo-desc">' + f.analisis.observacion + '</div>'
            + '</div>';
        }).join('')
      : '<div class="hallazgo-item fortaleza"><div class="hallazgo-label">✓ Fortalezas</div><div class="hallazgo-desc">Sin fortalezas destacadas.</div></div>')
    + (alertas.length > 0
      ? alertas.slice(0,2).map(function(a) {
          return '<div class="hallazgo-item alerta">'
            + '<div class="hallazgo-label">⚠ Área de desarrollo</div>'
            + '<div class="hallazgo-comp">' + a.competencia + ' — Grado ' + a.analisis.grado + '</div>'
            + '<div class="hallazgo-desc">' + a.analisis.observacion + '</div>'
            + '</div>';
        }).join('')
      : '<div class="hallazgo-item alerta"><div class="hallazgo-label">⚠ Alertas</div><div class="hallazgo-desc">Sin áreas críticas detectadas.</div></div>')
    + '</div>'
    + '</div>'
    + '</div>'

    // ─── TAB COMPETENCIAS ───
    + '<div id="tab-competencias" style="display:none;">'
    + '<div class="card">'
    + '<div class="card-header"><span class="card-icon">🎯</span><span class="card-title">Análisis por competencia</span></div>'
    + analisis.map(function(a, idx) {
        const grado = a.analisis ? a.analisis.grado : 'D';
        const trans = transcripciones.find(function(t) { return t.competencia_id === a.competencia_id; });
        const video = videos.find(function(v) { return v.competencia_id === a.competencia_id; });
        const an = a.analisis || { s:0, t:0, a:0, r:0, total:0, grado:'D', observacion:'Sin datos.' };
        return '<div class="competencia-block">'
          + '<div class="comp-header" onclick="toggleComp(' + idx + ')">'
          + '<div class="comp-grado grado-' + grado + '">' + grado + '</div>'
          + '<div class="comp-info">'
          + '<div class="comp-nombre">' + a.competencia + '</div>'
          + '<div class="comp-obs">' + an.observacion + '</div>'
          + '</div>'
          + '<div class="comp-star">'
          + ['S','T','A','R'].map(function(l, li) {
              const val = [an.s, an.t, an.a, an.r][li];
              return '<div class="star-pip ' + (val > 0 ? 'active' : '') + '">' + l + '</div>';
            }).join('')
          + '</div>'
          + '<span class="comp-chevron" id="chev-' + idx + '">▼</span>'
          + '</div>'
          + '<div class="comp-body" id="cb-' + idx + '">'
          + '<div class="star-detalle">'
          + [
              { l:'S', n:'Situación', v: an.s, max:1 },
              { l:'T', n:'Tarea', v: an.t, max:1 },
              { l:'A', n:'Acción', v: an.a, max:2 },
              { l:'R', n:'Resultado', v: an.r, max:2 }
            ].map(function(item) {
              const cls = item.v >= item.max ? 'ok' : item.v > 0 ? 'parcial' : 'nok';
              return '<div class="star-item ' + cls + '">'
                + '<div class="star-letra">' + item.l + '</div>'
                + '<div class="star-nombre">' + item.n + '</div>'
                + '<div class="star-pts">' + item.v + '/' + item.max + ' pts</div>'
                + '</div>';
            }).join('')
          + '</div>'
          + (trans && trans.texto
            ? '<div class="transcripcion-box"><div class="transcripcion-label">Transcripción</div>' + trans.texto + '</div>'
            : '<div class="transcripcion-box"><div class="transcripcion-label">Transcripción</div>Sin transcripción disponible.</div>')
          + (video && video.url
            ? '<a href="' + video.url + '" target="_blank" class="video-link">▶ Ver video en Drive</a>'
            : '')
          + '</div>'
          + '</div>';
      }).join('')
    + '</div>'
    + '</div>'

    // ─── TAB EMOCIONAL ───
    + '<div id="tab-emocional" style="display:none;">'
    + '<div class="card">'
    + '<div class="card-header"><span class="card-icon">😊</span><span class="card-title">Perfil emocional durante la entrevista</span></div>'
    + '<div class="emo-grid">'
    + '<div class="emo-item"><div class="emo-emoji">' + (emoResumen.emoji || '😐') + '</div><div class="emo-valor">' + (emoResumen.disposicion || '—') + '</div><div class="emo-label">Disposición general</div></div>'
    + '<div class="emo-item"><div class="emo-emoji">😊</div><div class="emo-valor">' + (emoResumen.pct_positivo || 0) + '%</div><div class="emo-label">Expresión positiva</div></div>'
    + '<div class="emo-item"><div class="emo-emoji">😟</div><div class="emo-valor">' + (emoResumen.pct_negativo || 0) + '%</div><div class="emo-label">Tensión / Ansiedad</div></div>'
    + '<div class="emo-item"><div class="emo-emoji">👁️</div><div class="emo-valor">' + (emoResumen.pct_contacto || 0) + '%</div><div class="emo-label">Contacto visual</div></div>'
    + '</div>'
    + (emoResumen.alerta_tension ? '<div class="alerta-emo warn">⚠ Se detectó tensión elevada durante la entrevista. Puede indicar ansiedad situacional o dificultad con algunas preguntas.</div>' : '<div class="alerta-emo ok">✓ Nivel emocional dentro de rangos normales.</div>')
    + (emoResumen.alerta_contacto ? '<div class="alerta-emo warn">⚠ Contacto visual bajo. El candidato tendió a desviar la mirada durante las respuestas.</div>' : '')
    + (emociones.length === 0 ? '<div style="text-align:center;padding:2rem;color:var(--hint);font-size:13px;">Análisis emocional no disponible para esta entrevista.</div>' : '')
    + '</div>'
    + '</div>'

    // ─── TAB BRECHA ───
    + '<div id="tab-brecha" style="display:none;">'
    + '<div class="card">'
    + '<div class="card-header"><span class="card-icon">📊</span><span class="card-title">Brecha vs perfil requerido</span></div>'
    + '<div style="margin-bottom:1.5rem;">'
    + '<canvas id="radar-chart" style="max-height:300px;"></canvas>'
    + '</div>'
    + '<div style="margin-bottom:.5rem;display:flex;gap:2rem;font-size:11px;color:var(--muted);">'
    + '<span>Barra = Grado obtenido &nbsp;|&nbsp; Línea = Mínimo requerido</span>'
    + '<span style="margin-left:auto;">A=4 · B=3 · C=2 · D=1</span>'
    + '</div>'
    + analisis.map(function(a) {
        const grado = a.analisis ? a.analisis.grado : 'D';
        const reqs = GRADO_REQUERIDO[ent.cargo] || GRADO_REQUERIDO['Otro'];
        const req = reqs[a.competencia_id] || 'C';
        const pct = (GRADO_VAL[grado] / 4) * 100;
        const pctReq = (GRADO_VAL[req] / 4) * 100;
        return '<div class="brecha-item">'
          + '<div class="brecha-nombre">' + a.competencia + '</div>'
          + '<div class="brecha-bar-wrap">'
          + '<div class="brecha-bar ' + grado + '" style="width:' + pct + '%"></div>'
          + '<div class="brecha-min" style="left:' + pctReq + '%"></div>'
          + '</div>'
          + '<div class="brecha-grado grado-' + grado + '" style="font-family:var(--mono);font-size:13px;color:' + (grado==='A'?'var(--green)':grado==='B'?'var(--blue)':grado==='C'?'var(--amber)':'var(--red)') + '">' + grado + '</div>'
          + '<div class="brecha-req">Req: ' + req + '</div>'
          + '</div>';
      }).join('')
    + '</div>'
    + '</div>'

    + '</div>'; // fin informe

  document.getElementById('main-content').innerHTML = html;

  // Radar chart
  setTimeout(function() {
    const ctx = document.getElementById('radar-chart');
    if (!ctx || analisis.length === 0) return;
    const labels = analisis.map(function(a) { return a.competencia; });
    const obtenido = analisis.map(function(a) { return GRADO_VAL[a.analisis ? a.analisis.grado : 'D']; });
    const reqs = GRADO_REQUERIDO[ent.cargo] || GRADO_REQUERIDO['Otro'];
    const requerido = analisis.map(function(a) { return GRADO_VAL[reqs[a.competencia_id] || 'C']; });

    radarChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: labels,
        datasets: [
          { label: 'Obtenido', data: obtenido, backgroundColor: 'rgba(196,67,42,0.15)', borderColor: 'rgba(196,67,42,0.8)', borderWidth: 2, pointBackgroundColor: '#c4432a' },
          { label: 'Requerido', data: requerido, backgroundColor: 'rgba(30,58,92,0.08)', borderColor: 'rgba(30,58,92,0.5)', borderWidth: 2, borderDash: [5,5], pointBackgroundColor: '#1e3a5c' }
        ]
      },
      options: {
        scales: { r: { min: 0, max: 4, ticks: { stepSize: 1, callback: function(v) { return ['','D','C','B','A'][v]; } }, grid: { color: 'rgba(0,0,0,0.06)' } } },
        plugins: { legend: { position: 'bottom', labels: { font: { family: 'Syne', size: 11 } } } }
      }
    });
  }, 100);
}

// ══ HELPERS ══
function switchTab(tab, btn) {
  ['ejecutivo','competencias','emocional','brecha'].forEach(function(t) {
    const el = document.getElementById('tab-' + t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

  if (tab === 'brecha' && candidatoActual) {
    // Re-render radar si es necesario
    setTimeout(function() {
      if (!radarChart) renderInforme(candidatoActual);
    }, 50);
  }
}

function toggleComp(idx) {
  const body = document.getElementById('cb-' + idx);
  const chev = document.getElementById('chev-' + idx);
  if (body) body.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
}

function calcularEmoResumen(emociones) {
  if (!emociones || emociones.length === 0) return {};
  const total = emociones.length;
  const pctPos = Math.round(emociones.reduce(function(s,e) { return s + (e.pct_positivo||0); }, 0) / total);
  const pctNeg = Math.round(emociones.reduce(function(s,e) { return s + (e.pct_negativo||0); }, 0) / total);
  const pctCont = Math.round(emociones.reduce(function(s,e) { return s + (e.pct_contacto_visual||0); }, 0) / total);

  let disposicion, emoji;
  if (pctPos >= 40) { disposicion = 'Positiva'; emoji = '😊'; }
  else if (pctNeg >= 40) { disposicion = 'Tensa'; emoji = '😟'; }
  else { disposicion = 'Neutral'; emoji = '😐'; }

  return {
    disposicion, emoji,
    pct_positivo: pctPos,
    pct_negativo: pctNeg,
    pct_contacto: pctCont,
    alerta_tension: pctNeg >= 50,
    alerta_contacto: pctCont < 30
  };
}

function generarResumenEjecutivo(ent, analisis, emoResumen, rec) {
  if (analisis.length === 0) return 'No hay datos suficientes para generar un resumen ejecutivo.';

  const fortalezas = analisis.filter(function(a) { return a.analisis && (a.analisis.grado === 'A' || a.analisis.grado === 'B'); });
  const alertas = analisis.filter(function(a) { return a.analisis && (a.analisis.grado === 'D'); });
  const medio = analisis.filter(function(a) { return a.analisis && a.analisis.grado === 'C'; });

  let texto = ent.nombre + ' se presentó a la entrevista por competencias para el cargo de ' + ent.cargo + '. ';

  if (fortalezas.length > 0) {
    texto += 'Demostró fortalezas destacadas en ' + fortalezas.map(function(f) { return f.competencia + ' (Grado ' + f.analisis.grado + ')'; }).join(', ') + '. ';
  }
  if (medio.length > 0) {
    texto += 'Presenta un desempeño básico en ' + medio.map(function(m) { return m.competencia; }).join(' y ') + ', con oportunidades de desarrollo. ';
  }
  if (alertas.length > 0) {
    texto += 'Se identificaron brechas importantes en ' + alertas.map(function(a) { return a.competencia; }).join(' y ') + ', donde las respuestas no evidenciaron los componentes STAR esperados. ';
  }

  if (emoResumen.disposicion) {
    texto += 'A nivel emocional mostró una disposición ' + emoResumen.disposicion.toLowerCase() + ' durante la entrevista';
    if (emoResumen.pct_contacto !== undefined) {
      texto += ', con un ' + emoResumen.pct_contacto + '% de contacto visual. ';
    } else {
      texto += '. ';
    }
  }

  if (rec.clase === 'verde') texto += 'En términos generales, el perfil evaluado es compatible con los requerimientos del cargo.';
  else if (rec.clase === 'amarillo') texto += 'El perfil presenta condiciones parciales para el cargo, recomendándose una segunda instancia de evaluación.';
  else texto += 'El perfil evaluado presenta brechas significativas respecto al perfil requerido para el cargo.';

  return texto;
}

// ══ INIT ══
cargarDatos();
</script>
